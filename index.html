<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixelit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #0a0a1f; /* Dark purple */
            color: #0ff; /* Cyan */
            overflow: hidden;
        }
        /* Custom scrollbar for synthwave feel */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a1f;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #f0f; /* Fuchsia */
            border: 1px solid #0ff; /* Cyan border */
        }
        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Keyframe for subtle glow animation */
        @keyframes subtle-glow {
            0% { border-color: #0ff; box-shadow: 0 0 10px 0 #0ff; }
            50% { border-color: #f0f; box-shadow: 0 0 10px 0 #f0f; }
            100% { border-color: #0ff; box-shadow: 0 0 10px 0 #0ff; }
        }
        .canvas-glow {
            animation: subtle-glow 5s linear infinite;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.22.0",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "jszip": "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js",
    "gif.js": "https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
